name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # One block so merges cannot leave duplicate install lines or split steps badly.
      - name: Install and test
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip wheel
          python -m pip install -r requirements.txt
          python -m pip install "pytest>=8.0.0,<10"
          python -m pytest tests/ -q --tb=short
